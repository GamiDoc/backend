name: Image Prod

on:
  push:
    branches:
      - "main"
    paths:
      - "infra/docker/Dockerfile.prod"
      - ".github/workflows/image-prod.yaml"
      - "cmd/**"
      - "config/**"
      - "internal/**"
      - "rule/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: 1.26.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.prod
          push: true
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
          tags: |
            ghcr.io/gamidoc/backend-prod:latest
            ghcr.io/gamidoc/backend-prod:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/gamidoc/backend-prod:cache
          cache-to: type=registry,ref=ghcr.io/gamidoc/backend-prod:cache,mode=max
