name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-docs.yaml'
      - 'mkdocs.yaml'
      - "requirements.txt"
      - 'scripts/gen_docs.py'
      - "docs/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/configure-pages@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
      
      - run: |
          sudo apt-get update
          sudo apt-get install -y just
      
      - run: just docs-refresh
      
      - run: pip install -r requirements.txt

      - run: mkdocs build --config-file mkdocs.yaml

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
