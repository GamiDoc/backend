site_name: GamiDoc Backend Guide
site_url: https://gamidoc.github.io/backend
repo_name: backend
repo_url: https://github.com/gamidoc/backend

docs_dir: docs
site_dir: build

theme:
  name: material
  palette:
    - scheme: default
      primary: white
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  # logo: icon.svg
  # favicon: icon.svg
  features:
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gamidoc/backend

markdown_extensions:
  - admonition
  - attr_list
  - codehilite:
      guess_lang: false
      linenums: true
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

plugins:
  - awesome-pages
  - search
  - git-authors:
      show_contribution: true
      show_line_count: true
  - git-revision-date-localized:
      fallback_to_build_date: true
      enable_creation_date: true

nav:
  - Home: index.md
  - Reference:
      - Overview: reference/index.md
